name: Mise à jour des avertissements de voyage

on:
  schedule:
    - cron: '0 4 * * *'  # Chaque jour à 4h UTC (minuit EST)
  workflow_dispatch:       # Permet de déclencher manuellement

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances
        run: pip install requests

      - name: Parser les avertissements de voyage
        run: |
          python3 << 'EOF'
          import requests
          import json
          from datetime import date
          import sys
          import os
          import time

          URL = 'https://data.international.gc.ca/travel-voyage/index-alpha-fra.json'

          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36',
              'Accept': 'application/json',
          }

          resp = None
          for attempt in range(3):
              try:
                  print(f'Fetching {URL} (tentative {attempt+1}/3)...')
                  resp = requests.get(URL, headers=HEADERS, timeout=60)
                  resp.raise_for_status()
                  print(f'✅ Connexion réussie ({resp.status_code})')
                  break
              except Exception as e:
                  print(f'⚠️  Échec: {e}')
                  if attempt < 2:
                      time.sleep(10)

          if not resp or not resp.ok:
              print('ERREUR: Impossible de contacter le flux JSON officiel après toutes les tentatives.')
              sys.exit(1)

          entries = resp.json()['data']
          countries = []
          ignored = []

          for entry in entries.values():
              iso2 = entry['country-iso']
              name = entry['fra']['name']
              slug = entry['fra']['url-slug']
              level = entry['advisory-state'] + 1

              # Les territoires (ex. Açores = "PT-20") n'ont pas de polygone distinct
              # sur la carte mondiale (résolution pays) — on les ignore.
              if len(iso2) != 2:
                  ignored.append(name)
                  continue

              countries.append({'name': name, 'slug': slug, 'level': level, 'iso2': iso2})

          if not countries:
              print('ERREUR: Aucun pays trouvé — le format du flux JSON a peut-être changé.')
              sys.exit(1)

          if os.path.exists('data.json'):
              with open('data.json', encoding='utf-8') as f:
                  prev_count = len(json.load(f).get('countries', []))
              if prev_count and len(countries) < prev_count * 0.7:
                  print(f'ERREUR: Chute suspecte du nombre de pays ({len(countries)} vs {prev_count} précédemment) — le format du flux JSON a peut-être changé.')
                  sys.exit(1)

          countries.sort(key=lambda x: x['name'])

          output = {
              'updated': date.today().isoformat(),
              'source': URL,
              'countries': countries,
          }

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f'✅ data.json généré avec {len(countries)} pays')
          if ignored:
              print(f'ℹ️  Territoires ignorés (pas de polygone propre) ({len(ignored)}): {", ".join(ignored)}')
          EOF

      - name: Commit data.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          git diff --staged --quiet || git commit -m "🗺️ Mise à jour des avertissements — $(date +'%Y-%m-%d')"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

      - name: Créer ou mettre à jour l'issue d'échec
        if: failure()
        id: create_issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --search "Échec de la mise à jour des avertissements in:title" --state open --json number --jq '.[0].number // empty')
          BODY=$(printf 'Le workflow de mise à jour des données a échoué le %s.\n\nVoir les logs : %s' "$(date -u +'%Y-%m-%d %H:%M UTC')" "$RUN_URL")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "$BODY"
            echo "issue_url=${{ github.server_url }}/${{ github.repository }}/issues/$EXISTING" >> "$GITHUB_OUTPUT"
          else
            URL=$(gh issue create --repo "${{ github.repository }}" --title "⚠️ Échec de la mise à jour des avertissements de voyage" --body "$BODY")
            echo "issue_url=$URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Notifier Discord
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ISSUE_URL: ${{ steps.create_issue.outputs.issue_url }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "Aucun webhook Discord configuré (secret DISCORD_WEBHOOK_URL absent) — notification ignorée."
            exit 0
          fi
          PAYLOAD=$(jq -n --arg url "$ISSUE_URL" '{content: ("⚠️ **Trip Radar** — la mise à jour des avertissements de voyage a échoué.\n" + $url)}')
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" -d "$PAYLOAD"

      - name: Fermer l'issue si redevenu stable
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --search "Échec de la mise à jour des avertissements in:title" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "✅ Résolu — la mise à jour du $(date -u +'%Y-%m-%d') s'est déroulée normalement."
            gh issue close "$EXISTING" --repo "${{ github.repository }}"
          fi
