name: Mise à jour des avertissements de voyage

on:
  schedule:
    - cron: '0 6 * * *'  # Chaque jour à 6h UTC (2h EST)
  workflow_dispatch:       # Permet de déclencher manuellement

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances
        run: pip install requests beautifulsoup4

      - name: Parser les avertissements de voyage
        run: |
          python3 << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          import json
          from datetime import date
          import sys

          URL = 'https://voyage.gc.ca/voyager/avertissements'

          LEVEL_MAP = {
              'normal-precautions': 1,
              'increased-caution': 2,
              'reconsider-travel': 3,
              'do-not-travel': 4,
          }

          ISO2_MAP = {
              'Afghanistan': 'AF',
              'Afrique du Sud': 'ZA',
              'Albanie': 'AL',
              'Algérie': 'DZ',
              'Allemagne': 'DE',
              'Andorre': 'AD',
              'Angola': 'AO',
              'Antigua-et-Barbuda': 'AG',
              'Arabie saoudite': 'SA',
              'Argentine': 'AR',
              'Arménie': 'AM',
              'Australie': 'AU',
              'Autriche': 'AT',
              'Azerbaïdjan': 'AZ',
              'Bahamas': 'BS',
              'Bahreïn': 'BH',
              'Bangladesh': 'BD',
              'Barbade': 'BB',
              'Bélarus': 'BY',
              'Belgique': 'BE',
              'Belize': 'BZ',
              'Bénin': 'BJ',
              'Bhoutan': 'BT',
              'Bolivie': 'BO',
              'Bosnie-Herzégovine': 'BA',
              'Botswana': 'BW',
              'Brésil': 'BR',
              'Brunéi': 'BN',
              'Bulgarie': 'BG',
              'Burkina Faso': 'BF',
              'Burundi': 'BI',
              'Cabo Verde': 'CV',
              'Cambodge': 'KH',
              'Cameroun': 'CM',
              'Chili': 'CL',
              'Chine': 'CN',
              'Chypre': 'CY',
              'Colombie': 'CO',
              'Comores': 'KM',
              'Congo (République démocratique du)': 'CD',
              'Congo (République du)': 'CG',
              'Corée du Nord': 'KP',
              'Corée du Sud': 'KR',
              'Costa Rica': 'CR',
              "Côte d'Ivoire": 'CI',
              'Croatie': 'HR',
              'Cuba': 'CU',
              'Danemark': 'DK',
              'Djibouti': 'DJ',
              'Dominique': 'DM',
              'Égypte': 'EG',
              'El Salvador': 'SV',
              'Émirats arabes unis': 'AE',
              'Équateur': 'EC',
              'Érythrée': 'ER',
              'Espagne': 'ES',
              'Estonie': 'EE',
              'Éthiopie': 'ET',
              'Fidji': 'FJ',
              'Finlande': 'FI',
              'France': 'FR',
              'Gabon': 'GA',
              'Gambie': 'GM',
              'Géorgie': 'GE',
              'Ghana': 'GH',
              'Grèce': 'GR',
              'Grenade': 'GD',
              'Guatemala': 'GT',
              'Guinée': 'GN',
              'Guinée-Bissau': 'GW',
              'Guinée équatoriale': 'GQ',
              'Guyana': 'GY',
              'Haïti': 'HT',
              'Honduras': 'HN',
              'Hongrie': 'HU',
              'Inde': 'IN',
              'Indonésie': 'ID',
              'Irak': 'IQ',
              'Iran': 'IR',
              'Irlande': 'IE',
              'Islande': 'IS',
              'Israël': 'IL',
              'Italie': 'IT',
              'Jamaïque': 'JM',
              'Japon': 'JP',
              'Jordanie': 'JO',
              'Kazakhstan': 'KZ',
              'Kenya': 'KE',
              'Kirghizistan': 'KG',
              'Kiribati': 'KI',
              'Kosovo': 'XK',
              'Koweït': 'KW',
              'Laos': 'LA',
              'Lesotho': 'LS',
              'Lettonie': 'LV',
              'Liban': 'LB',
              'Libéria': 'LR',
              'Libye': 'LY',
              'Liechtenstein': 'LI',
              'Lituanie': 'LT',
              'Luxembourg': 'LU',
              'Macédoine du Nord': 'MK',
              'Madagascar': 'MG',
              'Malaisie': 'MY',
              'Malawi': 'MW',
              'Maldives': 'MV',
              'Mali': 'ML',
              'Malte': 'MT',
              'Maroc': 'MA',
              'Îles Marshall': 'MH',
              'Maurice': 'MU',
              'Mauritanie': 'MR',
              'Mexique': 'MX',
              'Micronésie': 'FM',
              'Moldova': 'MD',
              'Monaco': 'MC',
              'Mongolie': 'MN',
              'Monténégro': 'ME',
              'Mozambique': 'MZ',
              'Myanmar': 'MM',
              'Namibie': 'NA',
              'Nauru': 'NR',
              'Népal': 'NP',
              'Nicaragua': 'NI',
              'Niger': 'NE',
              'Nigéria': 'NG',
              'Norvège': 'NO',
              'Nouvelle-Zélande': 'NZ',
              'Oman': 'OM',
              'Ouganda': 'UG',
              'Ouzbékistan': 'UZ',
              'Pakistan': 'PK',
              'Palaos': 'PW',
              'Panama': 'PA',
              'Papouasie-Nouvelle-Guinée': 'PG',
              'Paraguay': 'PY',
              'Pays-Bas': 'NL',
              'Pérou': 'PE',
              'Philippines': 'PH',
              'Pologne': 'PL',
              'Portugal': 'PT',
              'Qatar': 'QA',
              'République centrafricaine': 'CF',
              'République dominicaine': 'DO',
              'République tchèque': 'CZ',
              'Roumanie': 'RO',
              'Royaume-Uni': 'GB',
              'Russie': 'RU',
              'Rwanda': 'RW',
              'Saint-Christophe-et-Niévès': 'KN',
              'Sainte-Lucie': 'LC',
              'Saint-Marin': 'SM',
              'Saint-Vincent-et-les-Grenadines': 'VC',
              'Îles Salomon': 'SB',
              'Samoa': 'WS',
              'São Tomé-et-Príncipe': 'ST',
              'Sénégal': 'SN',
              'Serbie': 'RS',
              'Seychelles': 'SC',
              'Sierra Leone': 'SL',
              'Singapour': 'SG',
              'Slovaquie': 'SK',
              'Slovénie': 'SI',
              'Somalie': 'SO',
              'Soudan': 'SD',
              'Soudan du Sud': 'SS',
              'Sri Lanka': 'LK',
              'Suède': 'SE',
              'Suisse': 'CH',
              'Suriname': 'SR',
              'Syrie': 'SY',
              'Tadjikistan': 'TJ',
              'Tanzanie': 'TZ',
              'Tchad': 'TD',
              'Thaïlande': 'TH',
              'Timor-Leste': 'TL',
              'Togo': 'TG',
              'Tonga': 'TO',
              'Trinité-et-Tobago': 'TT',
              'Tunisie': 'TN',
              'Turkménistan': 'TM',
              'Turquie': 'TR',
              'Tuvalu': 'TV',
              'Ukraine': 'UA',
              'Uruguay': 'UY',
              'Vanuatu': 'VU',
              'Venezuela': 'VE',
              'Viêt Nam': 'VN',
              'Yémen': 'YE',
              'Zambie': 'ZM',
              'Zimbabwe': 'ZW',
          }

          print('Fetching voyage.gc.ca...')
          resp = requests.get(URL, headers={'User-Agent': 'Mozilla/5.0 (compatible; trip-radar/1.0)'}, timeout=30)
          resp.raise_for_status()

          soup = BeautifulSoup(resp.text, 'html.parser')
          countries = []
          unknown = []

          for link in soup.find_all('a', href=lambda h: h and '/destinations/' in h):
              slug = link['href'].split('/destinations/')[-1].strip('/')
              name = link.get_text(strip=True)
              if not name or not slug:
                  continue

              # Cherche le niveau dans la ligne/cellule parente
              row = link.find_parent('tr') or link.find_parent('li') or link.find_parent('div')
              level = 0
              if row:
                  img = row.find('img', src=True)
                  if img:
                      src = img['src']
                      for key, lvl in LEVEL_MAP.items():
                          if key in src:
                              level = lvl
                              break

              if level == 0:
                  continue

              iso2 = ISO2_MAP.get(name, '')
              if not iso2:
                  unknown.append(name)

              countries.append({'name': name, 'slug': slug, 'level': level, 'iso2': iso2})

          if not countries:
              print('ERREUR: Aucun pays trouvé — la structure HTML a peut-être changé.')
              sys.exit(1)

          countries.sort(key=lambda x: x['name'])

          output = {
              'updated': date.today().isoformat(),
              'source': URL,
              'countries': countries,
          }

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f'✅ data.json généré avec {len(countries)} pays')
          if unknown:
              print(f'⚠️  Pays sans code ISO2 ({len(unknown)}): {", ".join(unknown)}')
          EOF

      - name: Commit data.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          git diff --staged --quiet || git commit -m "🗺️ Mise à jour des avertissements — $(date +'%Y-%m-%d')"
          git push
