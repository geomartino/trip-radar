<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip Radar — Avertissements de voyage</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1923;
      --surface: #162030;
      --border: #1e2f42;
      --text: #e8edf2;
      --text-muted: #6b8299;
      --accent: #3d8ef0;

      --level-1: #2a6e4e;
      --level-1-hover: #38a36e;
      --level-2: #b8860b;
      --level-2-hover: #e8a800;
      --level-3: #c05a1f;
      --level-3-hover: #f07030;
      --level-4: #8b1a1a;
      --level-4-hover: #cc2222;
      --level-0: #1a2a38;
      --level-0-hover: #243a52;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    .updated {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .updated strong { color: var(--text); }

    /* Filters */
    .filters {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: 4px;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      transition: all 0.15s;
      background: transparent;
      color: var(--text-muted);
      border-color: var(--border);
    }

    .filter-btn .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .filter-btn.active { color: var(--text); border-color: currentColor; }
    .filter-btn[data-level="all"].active { border-color: var(--accent); color: var(--accent); }
    .filter-btn[data-level="1"].active { border-color: var(--level-1-hover); color: var(--level-1-hover); }
    .filter-btn[data-level="2"].active { border-color: var(--level-2-hover); color: var(--level-2-hover); }
    .filter-btn[data-level="3"].active { border-color: var(--level-3-hover); color: var(--level-3-hover); }
    .filter-btn[data-level="4"].active { border-color: var(--level-4-hover); color: var(--level-4-hover); }
    .filter-btn:hover { color: var(--text); border-color: var(--text-muted); }

    .filter-count {
      font-size: 0.72rem;
      opacity: 0.7;
    }

    /* Map container */
    .map-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #map-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Country styles */
    .country {
      stroke: #0a1520;
      stroke-width: 0.4;
      transition: fill 0.2s;
      cursor: default;
    }

    .country.has-data { cursor: pointer; }
    .country.dimmed { opacity: 0.12; }

    .country[data-level="0"] { fill: var(--level-0); }
    .country[data-level="1"] { fill: var(--level-1); }
    .country[data-level="2"] { fill: var(--level-2); }
    .country[data-level="3"] { fill: var(--level-3); }
    .country[data-level="4"] { fill: var(--level-4); }

    .country.has-data[data-level="0"]:hover { fill: var(--level-0-hover); }
    .country.has-data[data-level="1"]:hover { fill: var(--level-1-hover); }
    .country.has-data[data-level="2"]:hover { fill: var(--level-2-hover); }
    .country.has-data[data-level="3"]:hover { fill: var(--level-3-hover); }
    .country.has-data[data-level="4"]:hover { fill: var(--level-4-hover); }

    /* Tooltip */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: #0d1a26ee;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      max-width: 240px;
      z-index: 100;
      display: none;
      backdrop-filter: blur(8px);
    }

    #tooltip .tt-name {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }

    #tooltip .tt-level {
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #tooltip .tt-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #tooltip .tt-hint {
      margin-top: 6px;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    /* Loading */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      gap: 14px;
      z-index: 50;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p { color: var(--text-muted); font-size: 0.88rem; }

    /* Legend */
    .legend {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: #0d1a26cc;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.78rem;
      backdrop-filter: blur(8px);
    }

    .legend-title {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .source-badge {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .source-badge a { color: var(--text-muted); text-decoration: none; }
    .source-badge a:hover { color: var(--accent); }

    /* Map navigation */
    #map-svg {
      cursor: grab;
    }
    #map-svg:active {
      cursor: grabbing;
    }

    .map-controls {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 10;
    }

    .map-ctrl-btn {
      width: 32px;
      height: 32px;
      background: #0d1a26cc;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 1.1rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      transition: color 0.15s, border-color 0.15s;
    }

    .map-ctrl-btn:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    .map-ctrl-sep {
      height: 8px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
</head>
<body>

<header>
  <div class="logo">✈️ Trip<span>Radar</span></div>
  <div class="updated" id="updated-label">Chargement…</div>
</header>

<div class="filters" id="filters">
<button class="filter-btn active" data-level="all">
    <span>Tous les pays</span>
    <span class="filter-count" id="count-all"></span>
  </button>
  <button class="filter-btn" data-level="1">
    <span class="dot" style="background:var(--level-1-hover)"></span>
    <span>Mesures normales</span>
    <span class="filter-count" id="count-1"></span>
  </button>
  <button class="filter-btn" data-level="2">
    <span class="dot" style="background:var(--level-2-hover)"></span>
    <span>Grande prudence</span>
    <span class="filter-count" id="count-2"></span>
  </button>
  <button class="filter-btn" data-level="3">
    <span class="dot" style="background:var(--level-3-hover)"></span>
    <span>Voyage non essentiel</span>
    <span class="filter-count" id="count-3"></span>
  </button>
  <button class="filter-btn" data-level="4">
    <span class="dot" style="background:var(--level-4-hover)"></span>
    <span>Évitez tout voyage</span>
    <span class="filter-count" id="count-4"></span>
  </button>
</div>

<div class="map-wrapper">
  <div id="loading">
    <div class="spinner"></div>
    <p>Chargement des avertissements…</p>
  </div>

  <svg id="map-svg" viewBox="0 0 2000 1001" xmlns="http://www.w3.org/2000/svg">
  </svg>

  <div class="map-controls">
    <button class="map-ctrl-btn" id="btn-zoom-in" title="Zoom avant">+</button>
    <button class="map-ctrl-btn" id="btn-zoom-out" title="Zoom arrière">−</button>
    <div class="map-ctrl-sep"></div>
    <button class="map-ctrl-btn" id="btn-reset" title="Vue globale">⊙</button>
  </div>

  <div class="legend">
    <div class="legend-title">Niveau de risque</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--level-1)"></span> Mesures normales</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--level-2)"></span> Grande prudence</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--level-3)"></span> Évitez si non essentiel</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--level-4)"></span> Évitez tout voyage</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--level-0)"></span> Aucune donnée</div>
  </div>

  <div class="source-badge">
    Source : <a href="https://voyage.gc.ca/voyager/avertissements" target="_blank">Affaires mondiales Canada</a>
  </div>
</div>

<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-level">
    <span class="tt-dot" id="tt-dot"></span>
    <span id="tt-level-text"></span>
  </div>
  <div class="tt-hint" id="tt-hint"></div>
</div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────

const LEVEL_LABELS = {
  1: 'Prenez des mesures de sécurité normales',
  2: 'Faites preuve d\'une grande prudence',
  3: 'Évitez tout voyage non essentiel',
  4: 'Évitez tout voyage'
};

// ─── ISO numeric → ISO2 ──────────────────────────────────────────────────────
const NUM_TO_ISO2 = {
  '004':'AF','008':'AL','012':'DZ','024':'AO','028':'AG','032':'AR',
  '036':'AU','040':'AT','031':'AZ','044':'BS','048':'BH','050':'BD',
  '052':'BB','112':'BY','056':'BE','084':'BZ','204':'BJ','064':'BT',
  '068':'BO','070':'BA','072':'BW','076':'BR','096':'BN','100':'BG',
  '854':'BF','108':'BI','132':'CV','116':'KH','120':'CM','124':'CA',
  '140':'CF','148':'TD','152':'CL','156':'CN','170':'CO','174':'KM',
  '178':'CG','180':'CD','188':'CR','191':'HR','192':'CU','196':'CY',
  '203':'CZ','208':'DK','262':'DJ','212':'DM','214':'DO','218':'EC',
  '818':'EG','222':'SV','226':'GQ','232':'ER','233':'EE','231':'ET',
  '242':'FJ','246':'FI','250':'FR','266':'GA','270':'GM','268':'GE',
  '276':'DE','288':'GH','300':'GR','308':'GD','320':'GT','324':'GN',
  '624':'GW','328':'GY','332':'HT','340':'HN','348':'HU','356':'IN',
  '360':'ID','364':'IR','368':'IQ','372':'IE','376':'IL','380':'IT',
  '388':'JM','392':'JP','400':'JO','398':'KZ','404':'KE','296':'KI',
  '408':'KP','410':'KR','414':'KW','417':'KG','418':'LA','428':'LV',
  '422':'LB','426':'LS','430':'LR','434':'LY','438':'LI','440':'LT',
  '442':'LU','450':'MG','454':'MW','458':'MY','462':'MV','466':'ML',
  '470':'MT','584':'MH','478':'MR','480':'MU','484':'MX','583':'FM',
  '498':'MD','492':'MC','496':'MN','499':'ME','504':'MA','508':'MZ',
  '104':'MM','516':'NA','520':'NR','524':'NP','528':'NL','554':'NZ',
  '558':'NI','562':'NE','566':'NG','807':'MK','578':'NO','512':'OM',
  '586':'PK','585':'PW','591':'PA','598':'PG','600':'PY','604':'PE',
  '608':'PH','616':'PL','620':'PT','634':'QA','642':'RO','643':'RU',
  '646':'RW','659':'KN','662':'LC','670':'VC','882':'WS','674':'SM',
  '678':'ST','682':'SA','686':'SN','688':'RS','690':'SC','694':'SL',
  '702':'SG','703':'SK','705':'SI','090':'SB','706':'SO','710':'ZA',
  '728':'SS','724':'ES','144':'LK','729':'SD','740':'SR','748':'SZ',
  '752':'SE','756':'CH','760':'SY','762':'TJ','764':'TH','768':'TG',
  '776':'TO','780':'TT','788':'TN','792':'TR','795':'TM','798':'TV',
  '800':'UG','804':'UA','784':'AE','826':'GB','840':'US','858':'UY',
  '860':'UZ','548':'VU','862':'VE','704':'VN','887':'YE','894':'ZM',
  '716':'ZW','352':'IS','626':'TL','800':'UG','388':'JM',
};

// ─── State ────────────────────────────────────────────────────────────────────
let advisoryData = {};
let activeFilter = 'all';
const tooltip = document.getElementById('tooltip');

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const [data, world] = await Promise.all([
      fetch(`data.json?t=${Date.now()}`).then(r => r.json()),
      fetch('https://unpkg.com/world-atlas@2/countries-110m.json').then(r => r.json())
    ]);

    data.countries.forEach(c => {
      advisoryData[c.iso2] = c;
    });

    document.getElementById('updated-label').innerHTML =
      `Données du <strong>${data.updated}</strong>`;

    updateCounts(data.countries);
    buildMap(world);
    document.getElementById('loading').style.display = 'none';
  } catch (e) {
    document.getElementById('loading').innerHTML =
      '<p style="color:#cc4444">Erreur de chargement des données.</p>';
    console.error(e);
  }
}

function updateCounts(countries) {
  const counts = { 1: 0, 2: 0, 3: 0, 4: 0 };
  countries.forEach(c => { if (counts[c.level] !== undefined) counts[c.level]++; });
  const total = countries.length;

  document.getElementById('count-all').textContent = `(${total})`;
  document.getElementById('count-1').textContent = `(${counts[1]})`;
  document.getElementById('count-2').textContent = `(${counts[2]})`;
  document.getElementById('count-3').textContent = `(${counts[3]})`;
  document.getElementById('count-4').textContent = `(${counts[4]})`;
}

let mapZoom, mapSvgD3;

function buildMap(world) {
  const svg = document.getElementById('map-svg');
  const width = 2000, height = 1001;

  const projection = d3.geoNaturalEarth1()
    .scale(320)
    .translate([width / 2, height / 2]);

  const pathGen = d3.geoPath(projection);

  // Groupe principal — cible du zoom/pan
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  svg.appendChild(g);

  // Fond océan
  const sphere = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  sphere.setAttribute('d', pathGen({type: 'Sphere'}));
  sphere.style.fill = '#0d1a26';
  g.appendChild(sphere);

  // Lignes de grille
  const gratEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  gratEl.setAttribute('d', pathGen(d3.geoGraticule()()));
  gratEl.style.fill = 'none';
  gratEl.style.stroke = '#162535';
  gratEl.style.strokeWidth = '0.4';
  g.appendChild(gratEl);

  // Pays
  const countries = topojson.feature(world, world.objects.countries);

  countries.features.forEach(feature => {
    const iso2 = NUM_TO_ISO2[String(feature.id).padStart(3, '0')] || '';
    const info = advisoryData[iso2] || null;
    const level = info ? info.level : 0;

    const d = pathGen(feature);
    if (!d) return;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('data-iso2', iso2);
    path.setAttribute('data-level', level);
    path.classList.add('country');

    if (info) {
      path.classList.add('has-data');
      path.setAttribute('data-name', info.name);
      path.setAttribute('data-slug', info.slug);
      path.addEventListener('click', () => {
        window.open(`https://voyage.gc.ca/destinations/${info.slug}`, '_blank');
      });
    }

    path.addEventListener('mousemove', (e) => showTooltip(e, iso2, info, level));
    path.addEventListener('mouseleave', hideTooltip);

    g.appendChild(path);
  });

  // Zoom & pan
  mapSvgD3 = d3.select(svg);
  mapZoom = d3.zoom()
    .scaleExtent([1, 10])
    .on('zoom', (event) => {
      g.setAttribute('transform', event.transform.toString());
    });

  mapSvgD3.call(mapZoom).on('dblclick.zoom', null);

  // Boutons de navigation
  document.getElementById('btn-zoom-in').addEventListener('click', () => {
    mapSvgD3.transition().duration(300).call(mapZoom.scaleBy, 1.5);
  });
  document.getElementById('btn-zoom-out').addEventListener('click', () => {
    mapSvgD3.transition().duration(300).call(mapZoom.scaleBy, 1 / 1.5);
  });
  document.getElementById('btn-reset').addEventListener('click', () => {
    mapSvgD3.transition().duration(400).call(mapZoom.transform, d3.zoomIdentity);
  });
}

function showTooltip(e, iso2, info, level) {
  if (!info) return;

  const colors = { 1: '#38a36e', 2: '#e8a800', 3: '#f07030', 4: '#cc2222', 0: '#6b8299' };
  document.getElementById('tt-name').textContent = info.name;
  document.getElementById('tt-dot').style.background = colors[level] || colors[0];
  document.getElementById('tt-level-text').textContent = LEVEL_LABELS[level] || 'Aucun avertissement';
  document.getElementById('tt-hint').textContent = level > 0 ? '→ Cliquer pour voir les détails' : '';

  tooltip.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const x = e.clientX + 14;
  const y = e.clientY - 10;
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  tooltip.style.left = (x + tw > window.innerWidth ? x - tw - 28 : x) + 'px';
  tooltip.style.top = (y + th > window.innerHeight ? y - th : y) + 'px';
}

document.getElementById('map-svg').addEventListener('mousemove', (e) => {
  if (tooltip.style.display === 'block') moveTooltip(e);
});

function hideTooltip() {
  tooltip.style.display = 'none';
}

// ─── Filters ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.level;
    applyFilter();
  });
});

function applyFilter() {
  document.querySelectorAll('.country').forEach(path => {
    const level = path.getAttribute('data-level');
    if (activeFilter === 'all') {
      path.classList.remove('dimmed');
    } else {
      path.classList.toggle('dimmed', level !== activeFilter);
    }
  });
}

// ─── Start ────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
