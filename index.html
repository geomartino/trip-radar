<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip Radar — Avertissements de voyage</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1923;
      --surface: #162030;
      --border: #1e2f42;
      --text: #e8edf2;
      --text-muted: #6b8299;
      --accent: #3d8ef0;

      --level-1: #2a6e4e;
      --level-1-hover: #38a36e;
      --level-2: #b8860b;
      --level-2-hover: #e8a800;
      --level-3: #c05a1f;
      --level-3-hover: #f07030;
      --level-4: #8b1a1a;
      --level-4-hover: #cc2222;
      --level-0: #1a2a38;
      --level-0-hover: #243a52;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    .updated {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .updated strong { color: var(--text); }

    /* Filters */
    .filters {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: 4px;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      transition: all 0.15s;
      background: transparent;
      color: var(--text-muted);
      border-color: var(--border);
    }

    .filter-btn .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .filter-btn.active { color: var(--text); border-color: currentColor; }
    .filter-btn[data-level="all"].active { border-color: var(--accent); color: var(--accent); }
    .filter-btn[data-level="1"].active { border-color: var(--level-1-hover); color: var(--level-1-hover); }
    .filter-btn[data-level="2"].active { border-color: var(--level-2-hover); color: var(--level-2-hover); }
    .filter-btn[data-level="3"].active { border-color: var(--level-3-hover); color: var(--level-3-hover); }
    .filter-btn[data-level="4"].active { border-color: var(--level-4-hover); color: var(--level-4-hover); }
    .filter-btn:hover { color: var(--text); border-color: var(--text-muted); }

    .filter-count {
      font-size: 0.72rem;
      opacity: 0.7;
    }

    /* Map container */
    .map-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #map-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Country styles */
    .country {
      stroke: #0f1923;
      stroke-width: 0.4;
      transition: fill 0.2s;
      cursor: default;
    }

    .country.has-data { cursor: pointer; }
    .country.dimmed { opacity: 0.15; }

    .country[data-level="0"] { fill: var(--level-0); }
    .country[data-level="1"] { fill: var(--level-1); }
    .country[data-level="2"] { fill: var(--level-2); }
    .country[data-level="3"] { fill: var(--level-3); }
    .country[data-level="4"] { fill: var(--level-4); }

    .country.has-data[data-level="0"]:hover { fill: var(--level-0-hover); }
    .country.has-data[data-level="1"]:hover { fill: var(--level-1-hover); }
    .country.has-data[data-level="2"]:hover { fill: var(--level-2-hover); }
    .country.has-data[data-level="3"]:hover { fill: var(--level-3-hover); }
    .country.has-data[data-level="4"]:hover { fill: var(--level-4-hover); }

    /* Tooltip */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: #0d1a26ee;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      max-width: 240px;
      z-index: 100;
      display: none;
      backdrop-filter: blur(8px);
    }

    #tooltip .tt-name {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }

    #tooltip .tt-level {
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #tooltip .tt-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #tooltip .tt-hint {
      margin-top: 6px;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    /* Loading */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      gap: 14px;
      z-index: 50;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p { color: var(--text-muted); font-size: 0.88rem; }

    /* Legend */
    .legend {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: #0d1a26cc;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      backdrop-filter: blur(10px);
      font-size: 0.78rem;
    }

    .legend-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      color: var(--text);
    }

    .legend-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Source badge */
    .source-badge {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 0.7rem;
      color: var(--text-muted);
      background: #0d1a26cc;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      backdrop-filter: blur(8px);
    }

    .source-badge a { color: var(--text-muted); text-decoration: none; }
    .source-badge a:hover { color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="logo">✈️ Trip<span>Radar</span></div>
  <div class="updated" id="updated-label">Chargement…</div>
</header>

<div class="filters" id="filters">
  <span class="filter-label">Filtrer :</span>
  <button class="filter-btn active" data-level="all">
    <span>Tous les pays</span>
    <span class="filter-count" id="count-all"></span>
  </button>
  <button class="filter-btn" data-level="1">
    <span class="dot" style="background:var(--level-1-hover)"></span>
    <span>Mesures normales</span>
    <span class="filter-count" id="count-1"></span>
  </button>
  <button class="filter-btn" data-level="2">
    <span class="dot" style="background:var(--level-2-hover)"></span>
    <span>Grande prudence</span>
    <span class="filter-count" id="count-2"></span>
  </button>
  <button class="filter-btn" data-level="3">
    <span class="dot" style="background:var(--level-3-hover)"></span>
    <span>Voyage non essentiel</span>
    <span class="filter-count" id="count-3"></span>
  </button>
  <button class="filter-btn" data-level="4">
    <span class="dot" style="background:var(--level-4-hover)"></span>
    <span>Évitez tout voyage</span>
    <span class="filter-count" id="count-4"></span>
  </button>
</div>

<div class="map-wrapper">
  <div id="loading">
    <div class="spinner"></div>
    <p>Chargement des avertissements…</p>
  </div>

  <!-- SVG world map will be injected here -->
  <svg id="map-svg" viewBox="0 0 2000 1001" xmlns="http://www.w3.org/2000/svg">
  </svg>

  <div class="legend">
    <div class="legend-title">Niveau de risque</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--level-1)"></span> Mesures normales</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--level-2)"></span> Grande prudence</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--level-3)"></span> Évitez si non essentiel</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--level-4)"></span> Évitez tout voyage</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--level-0)"></span> Aucune donnée</div>
  </div>

  <div class="source-badge">
    Source : <a href="https://voyage.gc.ca/voyager/avertissements" target="_blank">Affaires mondiales Canada</a>
  </div>
</div>

<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-level">
    <span class="tt-dot" id="tt-dot"></span>
    <span id="tt-level-text"></span>
  </div>
  <div class="tt-hint" id="tt-hint"></div>
</div>

// ─── State ────────────────────────────────────────────────────────────────────
let advisoryData = {};
let activeFilter = 'all';
const tooltip = document.getElementById('tooltip');

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(`data.json?t=${Date.now()}`);
    const data = await res.json();

    // Index by ISO2
    data.countries.forEach(c => {
      advisoryData[c.iso2] = c;
    });

    // Update header
    document.getElementById('updated-label').innerHTML =
      `Données du <strong>${data.updated}</strong>`;

    // Update filter counts
    updateCounts(data.countries);

    // Build map
    buildMap();

    document.getElementById('loading').style.display = 'none';
  } catch (e) {
    document.getElementById('loading').innerHTML =
      '<p style="color:#cc4444">Erreur de chargement des données.</p>';
    console.error(e);
  }
}

function updateCounts(countries) {
  const counts = { 1: 0, 2: 0, 3: 0, 4: 0 };
  countries.forEach(c => { if (counts[c.level] !== undefined) counts[c.level]++; });
  const total = countries.length;

  document.getElementById('count-all').textContent = `(${total})`;
  document.getElementById('count-1').textContent = `(${counts[1]})`;
  document.getElementById('count-2').textContent = `(${counts[2]})`;
  document.getElementById('count-3').textContent = `(${counts[3]})`;
  document.getElementById('count-4').textContent = `(${counts[4]})`;
}

function buildMap() {
  const svg = document.getElementById('map-svg');

  Object.entries(MAP_PATHS).forEach(([iso2, pathData]) => {
    const info = advisoryData[iso2];
    const level = info ? info.level : 0;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', pathData);
    path.setAttribute('data-iso2', iso2);
    path.setAttribute('data-level', level);
    path.classList.add('country');

    if (info) {
      path.classList.add('has-data');
      path.setAttribute('data-name', info.name);
      path.setAttribute('data-slug', info.slug);

      // Click → open detail page
      path.addEventListener('click', () => {
        window.open(`https://voyage.gc.ca/destinations/${info.slug}`, '_blank');
      });
    }

    // Hover → tooltip
    path.addEventListener('mousemove', (e) => showTooltip(e, iso2, info, level));
    path.addEventListener('mouseleave', hideTooltip);

    svg.appendChild(path);
  });
}

function showTooltip(e, iso2, info, level) {
  if (!info) return;

  const colors = { 1: '#38a36e', 2: '#e8a800', 3: '#f07030', 4: '#cc2222', 0: '#6b8299' };
  document.getElementById('tt-name').textContent = info.name;
  document.getElementById('tt-dot').style.background = colors[level] || colors[0];
  document.getElementById('tt-level-text').textContent = LEVEL_LABELS[level] || 'Aucun avertissement';
  document.getElementById('tt-hint').textContent = level > 0 ? '→ Cliquer pour voir les détails' : '';

  tooltip.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const x = e.clientX + 14;
  const y = e.clientY - 10;
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  tooltip.style.left = (x + tw > window.innerWidth ? x - tw - 28 : x) + 'px';
  tooltip.style.top = (y + th > window.innerHeight ? y - th : y) + 'px';
}

document.getElementById('map-svg').addEventListener('mousemove', (e) => {
  if (tooltip.style.display === 'block') moveTooltip(e);
});

function hideTooltip() {
  tooltip.style.display = 'none';
}

// ─── Filters ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.level;
    applyFilter();
  });
});

function applyFilter() {
  document.querySelectorAll('.country').forEach(path => {
    const level = path.getAttribute('data-level');
    if (activeFilter === 'all') {
      path.classList.remove('dimmed');
    } else {
      path.classList.toggle('dimmed', level !== activeFilter);
    }
  });
}

// ─── Start ────────────────────────────────────────────────────────────────────
init();
</script>
